<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="refresh" content="60">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thursday Open 1 Results</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 16px;
      background: #f7f7f7;
      color: #222;
    }
    h1 { margin: 0 0 8px 0; font-size: 28px; }
    .meta { color: #666; font-size: 0.95rem; margin-bottom: 16px; }
    .nav { margin-bottom: 16px; }
    .nav a { color: #1a5fb4; text-decoration: none; font-weight: bold; }
    .table-wrap {
      overflow-x: auto;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 10px;
    }
    table.results-table {
      border-collapse: collapse;
      width: 100%;
      font-size: 15px;
      background: white;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px 10px;
      text-align: left;
      white-space: nowrap;
    }
    th {
      background: #e9ecef;
      position: sticky;
      top: 0;
      cursor: pointer;
    }
    tr:nth-child(even) { background: #fafafa; }
    tr:hover { background: #eef5ff; }
  </style>
</head>
<body>
  <div class="nav"><a href="./index.html">← Back to event pages</a></div>
  <h1>Thursday Open 1 Results</h1>
  <div class="meta">Auto-refreshes every 60 seconds</div>
  <div class="table-wrap"><table class="dataframe results-table">
  <thead>
    <tr style="text-align: right;">
      <th>RO</th>
      <th>First Name</th>
      <th>Last Name</th>
      <th>Dog</th>
      <th>Total</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>1</td>
      <td>Pam</td>
      <td>Mueller</td>
      <td>Gnat</td>
      <td>58</td>
    </tr>
    <tr>
      <td>2</td>
      <td>Josh</td>
      <td>Newcomb</td>
      <td>Hatchet</td>
      <td>66</td>
    </tr>
    <tr>
      <td>3</td>
      <td>Martha</td>
      <td>Walke</td>
      <td>Gael</td>
      <td>RT</td>
    </tr>
    <tr>
      <td>4</td>
      <td>Beverly</td>
      <td>Lambert</td>
      <td>Queen</td>
      <td>RT</td>
    </tr>
    <tr>
      <td>5</td>
      <td>Chloe</td>
      <td>Scott</td>
      <td>Una</td>
      <td>73</td>
    </tr>
  </tbody>
</table></div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const getCellValue = (tr, idx) => tr.children[idx]?.innerText?.trim() || "";
      const comparer = (idx, asc) => (a, b) => {
        const v1 = getCellValue(asc ? a : b, idx);
        const v2 = getCellValue(asc ? b : a, idx);
        const n1 = parseFloat(v1);
        const n2 = parseFloat(v2);

        if (!isNaN(n1) && !isNaN(n2)) return n1 - n2;

        return v1.localeCompare(v2, undefined, {
          numeric: true,
          sensitivity: "base"
        });
      };

      document.querySelectorAll("th").forEach(th => {
        th.addEventListener("click", function () {
          const table = th.closest("table");
          const tbody = table.querySelector("tbody");
          const idx = Array.from(th.parentNode.children).indexOf(th);
          const asc = !th.classList.contains("asc");

          table.querySelectorAll("th").forEach(h => h.classList.remove("asc", "desc"));
          th.classList.add(asc ? "asc" : "desc");

          Array.from(tbody.querySelectorAll("tr"))
            .sort(comparer(idx, asc))
            .forEach(tr => tbody.appendChild(tr));
        });
      });
    });
  </script>
</body>
</html>
